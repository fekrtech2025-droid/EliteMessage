name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      ENABLE_EXTERNAL_CONNECTIONS: false
      LOG_LEVEL: info
      CUSTOMER_WEB_APP_NAME: Elite Message Customer
      CUSTOMER_WEB_PORT: 3000
      CUSTOMER_WEB_PUBLIC_BASE_URL: http://localhost:3000
      ADMIN_WEB_APP_NAME: Elite Message Admin
      ADMIN_WEB_PORT: 3001
      ADMIN_WEB_PUBLIC_BASE_URL: http://localhost:3001
      API_APP_NAME: Elite Message API
      API_PORT: 3002
      API_BASE_URL: http://localhost:3002
      API_ACCESS_TOKEN_TTL: 15m
      API_REFRESH_TOKEN_TTL: 7d
      API_COOKIE_DOMAIN: localhost
      API_COOKIE_SECURE: false
      API_CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      API_INTERNAL_TOKEN: ci-internal-token
      WORKER_APP_NAME: Elite Message Worker
      WORKER_PORT: 3003
      WORKER_HEARTBEAT_INTERVAL_MS: 30000
      WORKER_ID: worker-ci
      WORKER_REGION: ci
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elite_message
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/elite_message?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: http://localhost:9000
      S3_PORT: 9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: elite-message-local
      S3_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
