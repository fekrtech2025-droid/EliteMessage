---
deployment:
  tasks:
    - cp /home/levanpms/elite-message.env /home/levanpms/repositories/EliteMessage/.env
    - corepack enable
    - corepack prepare pnpm@10.33.0 --activate
    - pnpm install --frozen-lockfile
    - pnpm --filter @elite-message/admin-web build
    - rm -rf apps/admin-web/runtime
    - mkdir -p apps/admin-web/runtime
    - cp -R apps/admin-web/.next/standalone/apps/admin-web/. apps/admin-web/runtime/
    - mkdir -p apps/admin-web/runtime/.next
    - cp -R apps/admin-web/.next/static apps/admin-web/runtime/.next/
    - rm -f /home/levanpms/repositories/EliteMessage/.env
