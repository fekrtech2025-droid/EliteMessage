---
deployment:
  tasks:
    - cp /home/levanpms/elite-message.env /home/levanpms/repositories/EliteMessage/.env
    - corepack enable
    - corepack prepare pnpm@10.33.0 --activate
    - pnpm install --frozen-lockfile
    - pnpm build
    - rm -rf /home/levanpms/elite-message-runtime/admin-web
    - mkdir -p /home/levanpms/elite-message-runtime/admin-web
    - cp -R apps/admin-web/.next/standalone/. /home/levanpms/elite-message-runtime/admin-web/
    - mkdir -p /home/levanpms/elite-message-runtime/admin-web/apps/admin-web/.next
    - cp -R apps/admin-web/.next/static /home/levanpms/elite-message-runtime/admin-web/apps/admin-web/.next/
    - rm -rf /home/levanpms/elite-message-runtime/customer-web
    - mkdir -p /home/levanpms/elite-message-runtime/customer-web
    - cp -R apps/customer-web/.next/standalone/. /home/levanpms/elite-message-runtime/customer-web/
    - mkdir -p /home/levanpms/elite-message-runtime/customer-web/apps/customer-web/.next
    - cp -R apps/customer-web/.next/static /home/levanpms/elite-message-runtime/customer-web/apps/customer-web/.next/
    - cp -R apps/customer-web/public /home/levanpms/elite-message-runtime/customer-web/apps/customer-web/
    - rm -f /home/levanpms/repositories/EliteMessage/.env
