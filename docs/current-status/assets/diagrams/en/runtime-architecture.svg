<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="shell" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fcfb" />
      <stop offset="100%" stop-color="#eef5fb" />
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5f8fc" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#0e6a56" />
      <stop offset="100%" stop-color="#17886f" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0c1730" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#3a567a" />
    </marker>
  </defs>
  <rect width="1200" height="700" fill="url(#shell)" />
  <rect x="18" y="18" width="1164" height="664" rx="28" fill="#ffffff" stroke="#d9e3ee" stroke-width="2" filter="url(#shadow)" />
  <rect x="18" y="18" width="1164" height="84" rx="28" fill="url(#accent)" />
  <g font-family="IBM Plex Sans, Arial Unicode MS, sans-serif" fill="#10213c" >
    
      <text x="600" y="68" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff" ><tspan x="600" dy="0">Runtime Architecture</tspan></text>
      <text x="600" y="130" text-anchor="middle" font-size="16" font-weight="600" fill="#607089">Current platform layout across web, API, worker, data, and operations</text>
      
    <rect x="92" y="176" width="260" height="96" rx="20" fill="url(#card)" stroke="#cfd9e7" />
    <text x="222" y="210" text-anchor="middle" font-size="22" font-weight="700" fill="#10213c" ><tspan x="222" dy="0">Customer Web</tspan></text>
    <text x="222" y="248" text-anchor="middle" font-size="15" font-weight="500" fill="#5c6d84" ><tspan x="222" dy="0">Next.js + React</tspan></text>
  
      
    <rect x="848" y="176" width="260" height="96" rx="20" fill="url(#card)" stroke="#cfd9e7" />
    <text x="978" y="210" text-anchor="middle" font-size="22" font-weight="700" fill="#10213c" ><tspan x="978" dy="0">Admin Web</tspan></text>
    <text x="978" y="248" text-anchor="middle" font-size="15" font-weight="500" fill="#5c6d84" ><tspan x="978" dy="0">Next.js + React</tspan></text>
  
      
    <rect x="410" y="166" width="380" height="122" rx="20" fill="#edf7f3" stroke="#badccd" />
    <text x="600" y="200" text-anchor="middle" font-size="30" font-weight="700" fill="#10213c" ><tspan x="600" dy="0">API</tspan></text>
    <text x="600" y="238" text-anchor="middle" font-size="17" font-weight="500" fill="#5c6d84" ><tspan x="600" dy="0">NestJS + Express + Socket.IO</tspan></text>
  
      
    <rect x="90" y="402" width="248" height="104" rx="20" fill="url(#card)" stroke="#cfd9e7" />
    <text x="214" y="436" text-anchor="middle" font-size="25" font-weight="700" fill="#10213c" ><tspan x="214" dy="0">PostgreSQL</tspan></text>
    <text x="214" y="474" text-anchor="middle" font-size="15" font-weight="500" fill="#5c6d84" ><tspan x="214" dy="0">Prisma data model</tspan></text>
  
      
    <rect x="368" y="402" width="208" height="104" rx="20" fill="url(#card)" stroke="#cfd9e7" />
    <text x="472" y="436" text-anchor="middle" font-size="25" font-weight="700" fill="#10213c" ><tspan x="472" dy="0">Redis</tspan></text>
    <text x="472" y="474" text-anchor="middle" font-size="15" font-weight="500" fill="#5c6d84" ><tspan x="472" dy="0">Queue + cache</tspan></text>
  
      
    <rect x="612" y="402" width="208" height="104" rx="20" fill="url(#card)" stroke="#cfd9e7" />
    <text x="716" y="436" text-anchor="middle" font-size="25" font-weight="700" fill="#10213c" ><tspan x="716" dy="0">MinIO</tspan></text>
    <text x="716" y="474" text-anchor="middle" font-size="15" font-weight="500" fill="#5c6d84" ><tspan x="716" dy="0">S3-compatible</tspan><tspan x="716" dy="20">storage</tspan></text>
  
      
    <rect x="856" y="386" width="254" height="136" rx="20" fill="#f8fafc" stroke="#cfd9e7" />
    <text x="983" y="420" text-anchor="middle" font-size="28" font-weight="700" fill="#10213c" ><tspan x="983" dy="0">Worker</tspan></text>
    <text x="983" y="458" text-anchor="middle" font-size="16" font-weight="500" fill="#5c6d84" ><tspan x="983" dy="0">BullMQ + whatsapp-web.js</tspan></text>
  
      <rect x="392" y="560" width="416" height="72" rx="20" fill="#fff7e8" stroke="#ead1a2" />
      <text x="600" y="590" text-anchor="middle" font-size="21" font-weight="700" fill="#10213c" ><tspan x="600" dy="0">Prometheus + Grafana + Alertmanager</tspan></text>
      <text x="600" y="617" text-anchor="middle" font-size="14" font-weight="500" fill="#6e654a" ><tspan x="600" dy="0">Health, metrics, dashboards, and alert</tspan><tspan x="600" dy="24">evaluation</tspan></text>
      <line x1="352" y1="225" x2="410" y2="225" stroke="#3a567a" stroke-width="3" marker-end="url(#arrow)" />
      <line x1="848" y1="225" x2="790" y2="225" stroke="#3a567a" stroke-width="3" marker-end="url(#arrow)" />
      <line x1="500" y1="288" x2="250" y2="402" stroke="#3a567a" stroke-width="3" marker-end="url(#arrow)" />
      <line x1="560" y1="288" x2="472" y2="402" stroke="#3a567a" stroke-width="3" marker-end="url(#arrow)" />
      <line x1="650" y1="288" x2="716" y2="402" stroke="#3a567a" stroke-width="3" marker-end="url(#arrow)" />
      <line x1="716" y1="288" x2="982" y2="386" stroke="#3a567a" stroke-width="3" marker-end="url(#arrow)" />
      <line x1="982" y1="522" x2="760" y2="596" stroke="#3a567a" stroke-width="3" marker-end="url(#arrow)" />
      <line x1="600" y1="506" x2="600" y2="560" stroke="#3a567a" stroke-width="3" marker-end="url(#arrow)" />
    
  </g>
</svg>
