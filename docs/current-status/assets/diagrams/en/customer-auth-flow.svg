<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="shell" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fcfb" />
      <stop offset="100%" stop-color="#eef5fb" />
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f5f8fc" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#0e6a56" />
      <stop offset="100%" stop-color="#17886f" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0c1730" flood-opacity="0.08" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#3a567a" />
    </marker>
  </defs>
  <rect width="1200" height="700" fill="url(#shell)" />
  <rect x="18" y="18" width="1164" height="664" rx="28" fill="#ffffff" stroke="#d9e3ee" stroke-width="2" filter="url(#shadow)" />
  <rect x="18" y="18" width="1164" height="84" rx="28" fill="url(#accent)" />
  <g font-family="IBM Plex Sans, Arial Unicode MS, sans-serif" fill="#10213c" >
    
      <text x="600" y="68" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff" ><tspan x="600" dy="0">Customer Authentication</tspan><tspan x="600" dy="24">Flow</tspan></text>
      <text x="600" y="132" text-anchor="middle" font-size="16" font-weight="600" fill="#607089">Operational journey from setup to ready state or API usage</text>
      
          <circle cx="120" cy="152" r="20" fill="#0e6a56" />
          <text x="120" y="159" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff" ><tspan x="120" dy="0">1</tspan></text>
          
    <rect x="40" y="176" width="160" height="112" rx="20" fill="#edf7f3" stroke="#badccd" />
    <text x="120" y="210" text-anchor="middle" font-size="18" font-weight="700" fill="#10213c" ><tspan x="120" dy="0">Open signin or</tspan><tspan x="120" dy="24">signup</tspan></text>
    
  
        
          <circle cx="520" cy="152" r="20" fill="#0e6a56" />
          <text x="520" y="159" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff" ><tspan x="520" dy="0">2</tspan></text>
          
    <rect x="440" y="176" width="160" height="112" rx="20" fill="url(#card)" stroke="#cfd9e7" />
    <text x="520" y="210" text-anchor="middle" font-size="18" font-weight="700" fill="#10213c" ><tspan x="520" dy="0">Submit credentials</tspan><tspan x="520" dy="24">or Google auth</tspan></text>
    
  
        
          <circle cx="920" cy="152" r="20" fill="#0e6a56" />
          <text x="920" y="159" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff" ><tspan x="920" dy="0">3</tspan></text>
          
    <rect x="840" y="176" width="160" height="112" rx="20" fill="url(#card)" stroke="#cfd9e7" />
    <text x="920" y="210" text-anchor="middle" font-size="18" font-weight="700" fill="#10213c" ><tspan x="920" dy="0">API validates or</tspan><tspan x="920" dy="24">creates session</tspan></text>
    
  
        
          <circle cx="320" cy="396" r="20" fill="#0e6a56" />
          <text x="320" y="403" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff" ><tspan x="320" dy="0">4</tspan></text>
          
    <rect x="240" y="420" width="160" height="112" rx="20" fill="url(#card)" stroke="#cfd9e7" />
    <text x="320" y="454" text-anchor="middle" font-size="18" font-weight="700" fill="#10213c" ><tspan x="320" dy="0">Customer workspace</tspan><tspan x="320" dy="24">becomes available</tspan></text>
    
  
        
      <line x1="200" y1="232" x2="440" y2="232" stroke="#3a567a" stroke-width="3" marker-end="url(#arrow)" />
      <line x1="600" y1="232" x2="840" y2="232" stroke="#3a567a" stroke-width="3" marker-end="url(#arrow)" />
      <polyline points="1000,288 1000,344 820,344 820,420" fill="none" stroke="#3a567a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)" />
      <line x1="400" y1="476" x2="640" y2="476" stroke="#3a567a" stroke-width="3" marker-end="url(#arrow)" />
    
  </g>
</svg>
